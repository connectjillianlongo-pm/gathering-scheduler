  button { background: transparent; border: 0.5px solid #ccc; border-radius: 8px; cursor: pointer; padding: 8px 16px; font-size: 14px; color: #1a1a18; transition: background 0.15s; }
  button:hover { background: #f0f0ee; }
  input { border: 0.5px solid #ccc; border-radius: 8px; padding: 10px 12px; font-size: 15px; width: 100%; outline: none; background: #fff; color: #1a1a18; }

<script type="text/babel">

const PRESET_COLORS = [
  { hex: "#4F8EF7", label: "Blue" },
  { hex: "#E2534A", label: "Red" },
  { hex: "#3DBF82", label: "Green" },
  { hex: "#F5A623", label: "Orange" },
  { hex: "#9B59B6", label: "Purple" },
  { hex: "#E91E8C", label: "Pink" },
  { hex: "#00BCD4", label: "Cyan" },
  { hex: "#FF7043", label: "Coral" },
  { hex: "#8BC34A", label: "Lime" },
  { hex: "#795548", label: "Brown" },
];

const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
const DAYS = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

function getDaysInMonth(y, m) { return new Date(y, m + 1, 0).getDate(); }
function getFirstDay(y, m) { return new Date(y, m, 1).getDay(); }
function genCode() { return Math.random().toString(36).substring(2, 8).toUpperCase(); }
function parseMonth(m) { const [y, mo] = m.split("-").map(Number); return { year: y, month: mo }; }
function sortMonths(arr) {
  return [...arr].sort((a, b) => {
    const [ay, am] = a.split("-").map(Number), [by, bm] = b.split("-").map(Number);
    return ay !== by ? ay - by : am - bm;
  });
}

const STORAGE_KEY = "gatheringScheduler_identity";
function saveIdentity(sid, name, color) {
  try {
    const all = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
    all[sid] = { name, color };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(all));
  } catch {}
}
function loadIdentity(sid) {
  try {
    const all = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
    return all[sid] || null;
  } catch { return null; }
}

async function dbGet(id) {
  const snap = await db.ref(`sessions/${id}`).get();
  return snap.exists() ? snap.val() : null;
}
async function dbSet(id, data) {
  await db.ref(`sessions/${id}`).set(data);
}
function dbListen(id, cb) {
  const ref = db.ref(`sessions/${id}`);
  ref.on("value", snap => { if (snap.exists()) cb(snap.val()); });
  return () => ref.off("value");
}

const { useState, useEffect } = React;

/* ── PARTICIPANT LIST ── */
function ParticipantList({ users, userName, sessionId, sessionData, saveSession }) {
  const [pendingDelete, setPendingDelete] = useState(null);

  async function confirmDelete(name) {
    const updatedUsers = (sessionData.users || []).filter(u => u.name !== name);
    const updatedAvail = {};
    Object.entries(sessionData.availability || {}).forEach(([key, entries]) => {
      const vals = Array.isArray(entries) ? entries : Object.values(entries);
      const filtered = vals.filter(u => u.name !== name);
      if (filtered.length > 0) updatedAvail[key] = filtered;
    });
    await saveSession(sessionId, { ...sessionData, users: updatedUsers, availability: updatedAvail });
    setPendingDelete(null);
  }

  return (
    <div style={{ padding: "12px 14px", borderRadius: 8, border: "0.5px solid #ddd", background: "#f5f5f4" }}>
      <p style={{ fontSize: 13, fontWeight: 500, marginBottom: 10 }}>Participants ({users.length})</p>
      <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
        {users.map((u, i) => {
          const isPending = pendingDelete === u.name;
          return (
            <div key={i} style={{ borderRadius: 8, border: isPending ? "1.5px solid #E2534A" : "0.5px solid #ddd", background: isPending ? "#fde8e8" : "#fff", overflow: "hidden" }}>
              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "8px 10px" }}>
                <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                  <div style={{ width: 10, height: 10, borderRadius: "50%", background: u.color, flexShrink: 0 }} />
                  <span style={{ fontSize: 13, color: isPending ? "#7a1a1a" : "#1a1a18" }}>
                    {u.name}{u.name === userName ? " (you)" : ""}
                  </span>
                </div>
                {!isPending ? (
                  <button onClick={() => setPendingDelete(u.name)}
                    style={{ fontSize: 12, padding: "3px 10px", borderRadius: 8, border: "0.5px solid #ccc", background: "transparent", color: "#666", cursor: "pointer" }}>
                    Remove
                  </button>
                ) : (
                  <button onClick={() => setPendingDelete(null)}
                    style={{ fontSize: 12, padding: "3px 10px", borderRadius: 8, border: "0.5px solid #E2534A", background: "transparent", color: "#7a1a1a", cursor: "pointer" }}>
                    Cancel
                  </button>
                )}
              </div>
              {isPending && (
                <div style={{ padding: "10px", borderTop: "0.5px solid #f0b8b8", background: "#fde8e8" }}>
                  <p style={{ fontSize: 13, color: "#7a1a1a", marginBottom: 10 }}>
                    Remove <strong>{u.name}</strong> and delete all their availability? This can't be undone.
                  </p>
                  <button onClick={() => confirmDelete(u.name)}
                    style={{ width: "100%", padding: "9px 0", fontSize: 13, fontWeight: 500, borderRadius: 8, background: "#E2534A", color: "#fff", border: "none", cursor: "pointer" }}>
                    Yes, remove {u.name}
                  </button>
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ── MAIN APP ── */
function App() {
  const [screen, setScreen] = useState("home");
  const [joinMode, setJoinMode] = useState(null); // null | "enter" | "view"
  const [userName, setUserName] = useState("");
  const [userColor, setUserColor] = useState("");
  const [selectedMonths, setSelectedMonths] = useState([]);
  const [eventTitle, setEventTitle] = useState("");
  const [sessionId, setSessionId] = useState(null);
  const [sessionData, setSessionData] = useState(null);
  const [viewMonthIdx, setViewMonthIdx] = useState(0);
  const [error, setError] = useState("");
  const [copied, setCopied] = useState(false);
  const [joinInput, setJoinInput] = useState("");
  const [submitted, setSubmitted] = useState(false);
  const [loading, setLoading] = useState(false);
  const [saveStatus, setSaveStatus] = useState("");
  const [viewOnly, setViewOnly] = useState(false);

  useEffect(() => {
    const hash = window.location.hash.slice(1);
    if (hash && hash.length <= 10) {
      setSessionId(hash);
      dbGet(hash).then(data => {
        if (!data) { setError("Session not found."); return; }
        setSessionData(data);
        const identity = loadIdentity(hash);
        if (identity && (data.users || []).some(u => u.name === identity.name && u.color === identity.color)) {
          setUserName(identity.name);
          setUserColor(identity.color);
          setViewMonthIdx(0);
          setSubmitted(false);
          setScreen("calendar");
        } else {
          setScreen("join");
        }
      });
    }
  }, []);

  useEffect(() => {
    if ((screen !== "calendar" && !submitted) || !sessionId) return;
    const unsub = dbListen(sessionId, data => setSessionData({ ...data }));
    return unsub;
  }, [screen, submitted, sessionId]);

  async function loadSession(id) {
    try {
      const data = await dbGet(id);
      if (data) setSessionData({ ...data });
      return data;
    } catch { return null; }
  }

  async function saveSession(id, data) {
    setSaveStatus("saving");
    await dbSet(id, data);
    setSessionData({ ...data });
    setSaveStatus("saved");
    setTimeout(() => setSaveStatus(""), 1500);
  }

  function getShareUrl(id) {
    return `${window.location.href.split("#")[0]}#${id || sessionId}`;
  }

  function copyLink(id) {
    const url = getShareUrl(id);
    const finish = () => { setCopied(true); setTimeout(() => setCopied(false), 2000); };
    if (navigator.clipboard?.writeText) navigator.clipboard.writeText(url).then(finish).catch(() => fallbackCopy(url, finish));
    else fallbackCopy(url, finish);
  }

  function fallbackCopy(text, cb) {
    const ta = document.createElement("textarea");
    ta.value = text; ta.style.cssText = "position:fixed;opacity:0;top:0;left:0";
    document.body.appendChild(ta); ta.focus(); ta.select();
    try { document.execCommand("copy"); cb?.(); } catch {}
    document.body.removeChild(ta);
  }

  function usedColors() { return (sessionData?.users || []).map(u => u.color); }

  /* ── HOME ── */
  if (screen === "home") return (
    <div style={{ maxWidth: 420, margin: "2rem auto", padding: "0 1rem" }}>
      <h2 style={{ fontSize: 22, fontWeight: 500, marginBottom: 6 }}>Gathering Scheduler</h2>
      <p style={{ color: "#666", fontSize: 15, marginBottom: 24 }}>Coordinate get-togethers with friends & family — no login needed.</p>
      <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
        <button onClick={() => { setScreen("setup"); setError(""); }}
          style={{ padding: "14px 0", fontSize: 15, fontWeight: 500, borderRadius: 8, background: "#4F8EF7", color: "#fff", border: "none" }}>
          Create a new scheduler
        </button>
        <div style={{ textAlign: "center", color: "#999", fontSize: 13 }}>— or —</div>
        <div style={{ display: "flex", gap: 8 }}>
          <input placeholder="Paste invite link or code" value={joinInput} onChange={e => setJoinInput(e.target.value)} style={{ flex: 1 }} />
          <button onClick={async () => {
            let raw = joinInput.trim();
            const id = raw.includes("#") ? raw.split("#").pop() : raw;
            if (!id) { setError("Enter a link or code."); return; }
            setLoading(true);
            const data = await dbGet(id);
            setLoading(false);
            if (!data) { setError("Session not found."); return; }
            setSessionId(id); window.location.hash = id; setSessionData(data);
            setJoinMode(null); setScreen("join"); setError("");
          }} style={{ padding: "10px 18px", whiteSpace: "nowrap" }}>{loading ? "..." : "Join"}</button>
        </div>
        {error && <p style={{ color: "#c0392b", fontSize: 13 }}>{error}</p>}
      </div>
    </div>
  );

  /* ── SETUP ── */
  if (screen === "setup") {
    const now = new Date();
    const monthOptions = Array.from({ length: 6 }, (_, i) => {
      const d = new Date(now.getFullYear(), now.getMonth() + i, 1);
      return { label: `${MONTHS[d.getMonth()]} ${d.getFullYear()}`, value: `${d.getFullYear()}-${d.getMonth()}` };
    });
    return (
      <div style={{ maxWidth: 420, margin: "2rem auto", padding: "0 1rem" }}>
        <button onClick={() => setScreen("home")} style={{ border: "none", color: "#888", fontSize: 13, padding: 0, marginBottom: 16, background: "none" }}>← Back</button>
        <h2 style={{ fontSize: 20, fontWeight: 500, marginBottom: 20 }}>Set up your scheduler</h2>
        <label style={{ fontSize: 13, color: "#666", display: "block", marginBottom: 6 }}>Event name</label>
        <input value={eventTitle} onChange={e => setEventTitle(e.target.value)} placeholder="e.g. Summer BBQ, Game Night, Family Reunion" style={{ marginBottom: 20 }} />
        <label style={{ fontSize: 13, color: "#666", display: "block", marginBottom: 8 }}>Which months should people pick from?</label>
        <div style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: 20 }}>
          {monthOptions.map(m => {
            const sel = selectedMonths.includes(m.value);
            return (
              <div key={m.value} onClick={() => {
                const updated = sel ? selectedMonths.filter(x => x !== m.value) : [...selectedMonths, m.value];
                setSelectedMonths(sortMonths(updated));
              }} style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 14px", borderRadius: 8, border: sel ? "1.5px solid #4F8EF7" : "0.5px solid #ddd", background: sel ? "#EBF2FF" : "#fff", cursor: "pointer" }}>
                <div style={{ width: 18, height: 18, borderRadius: 4, border: sel ? "2px solid #4F8EF7" : "1.5px solid #ccc", background: sel ? "#4F8EF7" : "transparent", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, color: "#fff", fontSize: 12 }}>
                  {sel && "✓"}
                </div>
                <span style={{ fontSize: 15 }}>{m.label}</span>
              </div>
            );
          })}
        </div>
        {error && <p style={{ color: "#c0392b", fontSize: 13, marginBottom: 10 }}>{error}</p>}
        <button onClick={async () => {
          if (!eventTitle.trim()) { setError("Enter an event name."); return; }
          if (!selectedMonths.length) { setError("Select at least one month."); return; }
          setLoading(true);
          const id = genCode();
          const data = { code: id, title: eventTitle.trim(), months: selectedMonths, users: [], availability: {} };
          await saveSession(id, data);
          setSessionId(id); window.location.hash = id;
          setLoading(false); setJoinMode(null); setScreen("join"); setError("");
        }} style={{ width: "100%", padding: "13px 0", fontSize: 15, fontWeight: 500, borderRadius: 8, background: loading ? "#aaa" : "#4F8EF7", color: "#fff", border: "none" }}>
          {loading ? "Creating..." : "Create & Continue"}
        </button>
      </div>
    );
  }

  /* ── JOIN ── */
  if (screen === "join") {
    const taken = usedColors();
    return (
      <div style={{ maxWidth: 420, margin: "2rem auto", padding: "0 1rem" }}>

        {/* Event banner */}
        {sessionData?.title && (
          <div style={{ marginBottom: 20, padding: "12px 16px", borderRadius: 8, background: "#EBF2FF", border: "1.5px solid #4F8EF7" }}>
            <p style={{ fontSize: 12, color: "#185FA5", marginBottom: 2, fontWeight: 500, textTransform: "uppercase", letterSpacing: "0.05em" }}>Event</p>
            <p style={{ fontSize: 18, fontWeight: 500, color: "#0C447C" }}>{sessionData.title}</p>
          </div>
        )}

        {/* Mode selector */}
        {!joinMode && (
          <>
            <h2 style={{ fontSize: 20, fontWeight: 500, marginBottom: 6 }}>What would you like to do?</h2>
            <p style={{ color: "#666", fontSize: 14, marginBottom: 20 }}>Choose whether you'd like to submit your own availability or just browse what others have shared.</p>
            <div style={{ display: "flex", flexDirection: "column", gap: 12, marginBottom: 24 }}>
              <div onClick={() => setJoinMode("enter")}
                style={{ padding: 16, borderRadius: 12, border: "1.5px solid #ddd", background: "#fff", cursor: "pointer", display: "flex", alignItems: "flex-start", gap: 14 }}>
                <div style={{ width: 38, height: 38, borderRadius: "50%", background: "#EBF2FF", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, fontSize: 18 }}>✏️</div>
                <div>
                  <p style={{ fontSize: 15, fontWeight: 500, marginBottom: 3 }}>Enter my availability</p>
                  <p style={{ fontSize: 13, color: "#666" }}>Select the dates you're free so the group can find the best time.</p>
                </div>
              </div>
              <div onClick={() => { setViewOnly(true); setViewMonthIdx(0); setScreen("calendar"); }}
                style={{ padding: 16, borderRadius: 12, border: "1.5px solid #ddd", background: "#fff", cursor: "pointer", display: "flex", alignItems: "flex-start", gap: 14 }}>
                <div style={{ width: 38, height: 38, borderRadius: "50%", background: "#e8f8f0", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, fontSize: 18 }}>👀</div>
                <div>
                  <p style={{ fontSize: 15, fontWeight: 500, marginBottom: 3 }}>View group availability</p>
                  <p style={{ fontSize: 13, color: "#666" }}>Browse the calendar to see when everyone is available — no sign-up needed.</p>
                </div>
              </div>
            </div>
            {/* Share link */}
            <div style={{ padding: 16, borderRadius: 8, border: "2px solid #4F8EF7", background: "#EBF2FF" }}>
              <p style={{ fontSize: 13, fontWeight: 500, color: "#0C447C", marginBottom: 10 }}>Share this link with friends & family</p>
              <div style={{ display: "flex", gap: 8 }}>
                <input readOnly value={getShareUrl(sessionId)} style={{ flex: 1, fontSize: 12, padding: "8px 10px", border: "0.5px solid #4F8EF7", background: "#fff", color: "#555" }} />
                <button onClick={() => copyLink(sessionId)}
                  style={{ padding: "8px 16px", fontSize: 13, fontWeight: 500, borderRadius: 8, whiteSpace: "nowrap", background: copied ? "#3DBF82" : "#4F8EF7", color: "#fff", border: "none" }}>
                  {copied ? "Copied!" : "Copy link"}
                </button>
              </div>
            </div>
          </>
        )}

        {/* Enter availability form */}
        {joinMode === "enter" && (
          <>
            <button onClick={() => { setJoinMode(null); setError(""); }} style={{ border: "none", color: "#888", fontSize: 13, padding: 0, marginBottom: 16, background: "none" }}>← Back</button>
            <h2 style={{ fontSize: 20, fontWeight: 500, marginBottom: 4 }}>Enter your details</h2>
            <p style={{ color: "#666", fontSize: 14, marginBottom: 20 }}>Your name and color help the group identify your availability on the calendar. No two people can share a color.</p>
            <label style={{ fontSize: 13, color: "#666", display: "block", marginBottom: 6 }}>Your name</label>
            <input value={userName} onChange={e => setUserName(e.target.value)} placeholder="e.g. Jamie" style={{ marginBottom: 18 }} />
            <label style={{ fontSize: 13, color: "#666", display: "block", marginBottom: 6 }}>Your color</label>
            <p style={{ fontSize: 13, color: "#666", marginBottom: 10 }}>Pick a color that will represent your availability on the calendar. Colors marked with ✕ are already taken.</p>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 10, marginBottom: 16 }}>
              {PRESET_COLORS.map(c => {
                const isTaken = taken.includes(c.hex), isSel = userColor === c.hex;
                return (
                  <div key={c.hex} title={isTaken ? `${c.label} (taken)` : c.label} onClick={() => { if (!isTaken) setUserColor(c.hex); }}
                    style={{ width: 34, height: 34, borderRadius: "50%", background: c.hex, opacity: isTaken ? 0.25 : 1, cursor: isTaken ? "not-allowed" : "pointer", border: isSel ? "3px solid #111" : "2px solid transparent", position: "relative", display: "flex", alignItems: "center", justifyContent: "center" }}>
                    {isTaken && <span style={{ color: "#fff", fontSize: 14 }}>✕</span>}
                  </div>
                );
              })}
            </div>
            {userColor && (
              <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 16, padding: "10px 12px", borderRadius: 8, background: "#f5f5f4", fontSize: 13 }}>
                <div style={{ width: 12, height: 12, borderRadius: "50%", background: userColor, flexShrink: 0 }} />
                <span style={{ color: "#666" }}>Your availability will appear in this color on the shared calendar.</span>
              </div>
            )}
            {error && <p style={{ color: "#c0392b", fontSize: 13, marginBottom: 10 }}>{error}</p>}
            <button onClick={async () => {
              if (!userName.trim()) { setError("Enter your name."); return; }
              if (!userColor) { setError("Pick a color."); return; }
              setLoading(true);
              const fresh = await dbGet(sessionId);
              setLoading(false);
              if (!fresh) { setError("Could not load session. Try again."); return; }
              if ((fresh.users || []).some(u => u.color === userColor)) { setError("That color was just taken. Pick another."); return; }
              const updated = { ...fresh, users: [...(fresh.users || []), { name: userName.trim(), color: userColor }] };
              await saveSession(sessionId, updated);
              saveIdentity(sessionId, userName.trim(), userColor);
              setViewMonthIdx(0); setSubmitted(false); setViewOnly(false); setScreen("calendar"); setError("");
            }} style={{ width: "100%", padding: "13px 0", fontSize: 15, fontWeight: 500, borderRadius: 8, background: loading ? "#aaa" : "#4F8EF7", color: "#fff", border: "none" }}>
              {loading ? "Joining..." : "Go to calendar"}
            </button>
          </>
        )}
      </div>
    );
  }

  /* ── CALENDAR ── */
  if (screen === "calendar" && !submitted && sessionData) {
    const months = sessionData.months || [];
    const clampedIdx = Math.min(viewMonthIdx, months.length - 1);
    const activeMonth = months[clampedIdx];
    const { year, month } = parseMonth(activeMonth);
    const daysInMonth = getDaysInMonth(year, month);
    const firstDay = getFirstDay(year, month);
    const totalCells = Math.ceil((firstDay + daysInMonth) / 7) * 7;
    const avail = sessionData.availability || {};
    const totalUsers = (sessionData.users || []).length;

    function dayKey(d) { return `${year}-${month}-${d}`; }
    function getUsersOnDay(d) {
      const v = avail[dayKey(d)];
      return v ? (Array.isArray(v) ? v : Object.values(v)) : [];
    }
    function isMyDay(d) { return !viewOnly && getUsersOnDay(d).some(u => u.name === userName); }

    async function toggleDay(d) {
      if (viewOnly) return;
      const key = dayKey(d);
      const snap = await db.ref(`sessions/${sessionId}/availability/${key}`).get();
      const current = snap.exists() ? Object.values(snap.val()) : [];
      if (current.some(u => u.name === userName)) {
        const raw = snap.val();
        const delKey = Object.keys(raw).find(k => raw[k].name === userName);
        if (delKey) await db.ref(`sessions/${sessionId}/availability/${key}/${delKey}`).remove();
      } else {
        await db.ref(`sessions/${sessionId}/availability/${key}`).push({ name: userName, color: userColor });
      }
      setSaveStatus("saved"); setTimeout(() => setSaveStatus(""), 1200);
    }

    const overlapSummary = {};
    Object.entries(avail).forEach(([key, val]) => {
      const users = Array.isArray(val) ? val : Object.values(val);
      const count = users.length;
      if (count === 0) return;
      const [y, mo, d] = key.split("-").map(Number);
      const label = `${MONTHS[mo].slice(0,3)} ${d}, ${y}`;
      if (!overlapSummary[count]) overlapSummary[count] = [];
      overlapSummary[count].push({ label, users });
    });
    const tiers = [];
    for (let n = totalUsers; n >= 1; n--) {
      if (overlapSummary[n]?.length > 0) tiers.push({ count: n, days: overlapSummary[n] });
    }

    return (
      <div style={{ maxWidth: 560, margin: "1rem auto", padding: "0 0.5rem" }}>

        {/* Header */}
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 14, flexWrap: "wrap", gap: 8 }}>
          <div>
            <p style={{ fontSize: 11, color: "#888", marginBottom: 2, textTransform: "uppercase", letterSpacing: "0.05em" }}>Scheduling for</p>
            <p style={{ fontSize: 17, fontWeight: 500 }}>{sessionData.title}</p>
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            {saveStatus && <span style={{ fontSize: 12, color: saveStatus === "saving" ? "#888" : "#3DBF82" }}>{saveStatus === "saving" ? "Saving..." : "Saved ✓"}</span>}
            {!viewOnly && userName && (
              <div style={{ display: "flex", alignItems: "center", gap: 6, padding: "6px 12px", borderRadius: 20, border: "0.5px solid #ddd", background: "#f5f5f4", fontSize: 13 }}>
                <div style={{ width: 10, height: 10, borderRadius: "50%", background: userColor }} />
                <span>{userName}</span>
              </div>
            )}
            {viewOnly && (
              <button onClick={() => { setViewOnly(false); setScreen("join"); setJoinMode("enter"); }}
                style={{ fontSize: 13, padding: "6px 14px", borderRadius: 8, cursor: "pointer", background: "#4F8EF7", color: "#fff", border: "none" }}>
                Enter my availability
              </button>
            )}
          </div>
        </div>

        {/* View-only banner */}
        {viewOnly && (
          <div style={{ marginBottom: 14, padding: "10px 14px", borderRadius: 8, background: "#EBF2FF", border: "1px solid #4F8EF7", fontSize: 13, color: "#185FA5" }}>
            Viewing group availability — tap "Enter my availability" above to participate.
          </div>
        )}

        {/* Share CTA */}
        <div onClick={() => copyLink(sessionId)} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 14, padding: "12px 16px", borderRadius: 8, background: "#4F8EF7", cursor: "pointer" }}>
          <div>
            <p style={{ fontSize: 13, fontWeight: 500, color: "#fff", marginBottom: 1 }}>Invite others to add their availability</p>
            <p style={{ fontSize: 12, color: "rgba(255,255,255,0.8)" }}>Tap to copy invite link</p>
          </div>
          <div style={{ padding: "6px 14px", borderRadius: 8, background: copied ? "#3DBF82" : "rgba(255,255,255,0.25)", color: "#fff", fontSize: 13, fontWeight: 500, whiteSpace: "nowrap" }}>
            {copied ? "Copied!" : "Copy link"}
          </div>
        </div>

        {/* Month pills + arrows */}
        <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 14 }}>
          <button onClick={() => setViewMonthIdx(i => Math.max(0, i - 1))} disabled={clampedIdx === 0}
            style={{ width: 30, height: 30, borderRadius: "50%", border: "0.5px solid #ccc", background: "#f0f0ee", cursor: clampedIdx === 0 ? "not-allowed" : "pointer", opacity: clampedIdx === 0 ? 0.35 : 1, fontSize: 16, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, padding: 0 }}>‹</button>
          <div style={{ display: "flex", gap: 6, flexWrap: "wrap", flex: 1 }}>
            {months.map((m, i) => {
              const { year: y, month: mo } = parseMonth(m);
              const active = i === clampedIdx;
              return (
                <button key={m} onClick={() => setViewMonthIdx(i)}
                  style={{ padding: "6px 14px", borderRadius: 20, fontSize: 13, border: active ? "none" : "0.5px solid #ccc", background: active ? "#4F8EF7" : "#f0f0ee", color: active ? "#fff" : "#1a1a18", fontWeight: active ? 500 : 400 }}>
                  {MONTHS[mo].slice(0, 3)} {y}
                </button>
              );
            })}
          </div>
          <button onClick={() => setViewMonthIdx(i => Math.min(months.length - 1, i + 1))} disabled={clampedIdx === months.length - 1}
            style={{ width: 30, height: 30, borderRadius: "50%", border: "0.5px solid #ccc", background: "#f0f0ee", cursor: clampedIdx === months.length - 1 ? "not-allowed" : "pointer", opacity: clampedIdx === months.length - 1 ? 0.35 : 1, fontSize: 16, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, padding: 0 }}>›</button>
        </div>

        {/* Calendar grid */}
        <div style={{ background: "#fff", borderRadius: 12, border: "0.5px solid #ddd", padding: "12px 10px" }}>
          <p style={{ textAlign: "center", fontWeight: 500, fontSize: 16, marginBottom: 12 }}>{MONTHS[month]} {year}</p>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 2, marginBottom: 4 }}>
            {DAYS.map(d => <div key={d} style={{ textAlign: "center", fontSize: 11, color: "#888", padding: "2px 0" }}>{d}</div>)}
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 3 }}>
            {Array.from({ length: totalCells }).map((_, i) => {
              const day = i - firstDay + 1;
              if (day < 1 || day > daysInMonth) return <div key={i} />;
              const mine = isMyDay(day);
              const users = getUsersOnDay(day);
              const count = users.length;
              let bg = "#f5f5f4", border = "#ddd", textCol = "#1a1a18";
              if (count > 0) {
                const ratio = count / Math.max(totalUsers, 1);
                if (ratio === 1 && totalUsers > 1) { bg = "#d4edda"; textCol = "#1a5e2a"; border = "#3DBF82"; }
                else if (ratio >= 0.5) { bg = "#fff3cd"; textCol = "#7a4f00"; border = "#F5A623"; }
                else { bg = "#fde8e8"; textCol = "#7a1a1a"; border = "#E2534A"; }
              }
              return (
                <div key={i} onClick={() => toggleDay(day)}
                  style={{ minHeight: 54, borderRadius: 6, border: `1.5px solid ${mine ? userColor : border}`, background: bg, cursor: viewOnly ? "default" : "pointer", padding: "4px 5px", display: "flex", flexDirection: "column", justifyContent: "space-between", position: "relative" }}>
                  <span style={{ fontSize: 13, fontWeight: mine ? 500 : 400, color: textCol }}>{day}</span>
                  <div style={{ display: "flex", flexWrap: "wrap", gap: 2, minHeight: 10 }}>
                    {users.slice(0, 5).map((u, idx) => <div key={idx} style={{ width: 6, height: 6, borderRadius: "50%", background: u.color }} />)}
                  </div>
                  {mine && <div style={{ position: "absolute", top: 3, right: 3, width: 8, height: 8, borderRadius: "50%", background: userColor, border: "2px solid #fff", zIndex: 1 }} />}
                </div>
              );
            })}
          </div>
        </div>

        {/* Legend */}
        <div style={{ marginTop: 12, display: "flex", flexWrap: "wrap", gap: 10, fontSize: 12, color: "#888" }}>
          {[["#d4edda","#3DBF82","All available"],["#fff3cd","#F5A623","Partial overlap"],["#fde8e8","#E2534A","Few available"],["#f5f5f4","#ddd","No responses"]].map(([bg,bd,label]) => (
            <div key={label} style={{ display: "flex", alignItems: "center", gap: 5 }}>
              <div style={{ width: 14, height: 14, borderRadius: 3, background: bg, border: `1.5px solid ${bd}` }} />
              <span>{label}</span>
            </div>
          ))}
        </div>

        {/* Overlap summary */}
        {tiers.length > 0 && (
          <div style={{ marginTop: 20, borderRadius: 12, border: "0.5px solid #ddd", overflow: "hidden" }}>
            <div style={{ padding: "10px 14px", background: "#f5f5f4", borderBottom: "0.5px solid #ddd" }}>
              <p style={{ fontSize: 13, fontWeight: 500 }}>Availability overlap summary</p>
              <p style={{ fontSize: 12, color: "#888", marginTop: 2 }}>{totalUsers} participant{totalUsers !== 1 ? "s" : ""} total</p>
            </div>
            {tiers.map(({ count, days }) => {
              const isAll = count === totalUsers && totalUsers > 1;
              const ratio = count / Math.max(totalUsers, 1);
              let bg = "#fde8e8", textCol = "#7a1a1a", dot = "#E2534A";
              if (isAll) { bg = "#d4edda"; textCol = "#1a5e2a"; dot = "#3DBF82"; }
              else if (ratio >= 0.5) { bg = "#fff3cd"; textCol = "#7a4f00"; dot = "#F5A623"; }
              const label = count === totalUsers ? `All ${totalUsers} available` : `${count} of ${totalUsers} available`;
              return (
                <div key={count} style={{ padding: "10px 14px", borderBottom: "0.5px solid #ddd", background: "#fff" }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8 }}>
                    <div style={{ width: 10, height: 10, borderRadius: "50%", background: dot, flexShrink: 0 }} />
                    <span style={{ fontSize: 13, fontWeight: 500 }}>{label}</span>
                  </div>
                  <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                    {days.map(({ label: dl, users }) => (
                      <div key={dl} style={{ display: "flex", alignItems: "center", gap: 4, padding: "4px 10px", borderRadius: 20, background: bg, fontSize: 12, color: textCol }}>
                        <span>{dl}</span>
                        <div style={{ display: "flex", gap: 2, marginLeft: 4 }}>
                          {users.slice(0, 5).map((u, idx) => <div key={idx} style={{ width: 6, height: 6, borderRadius: "50%", background: u.color }} />)}
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              );
            })}
          </div>
        )}

        {/* Participants */}
        <div style={{ marginTop: 16 }}>
          <ParticipantList
            users={sessionData.users || []}
            userName={userName}
            sessionId={sessionId}
            sessionData={sessionData}
            saveSession={saveSession}
          />
        </div>

        {!viewOnly && <p style={{ fontSize: 12, color: "#888", marginTop: 10, textAlign: "center" }}>Tap any date to mark yourself as available. Tap again to remove.</p>}

        {!viewOnly && (
          <button onClick={() => setSubmitted(true)}
            style={{ width: "100%", marginTop: 14, padding: "14px 0", fontSize: 15, fontWeight: 500, borderRadius: 8, background: "#3DBF82", color: "#fff", border: "none" }}>
            Submit availability
          </button>
        )}
      </div>
    );
  }

  /* ── SUBMITTED ── */
  if (submitted && sessionData) {
    const avail = sessionData.availability || {};
    const myDays = Object.entries(avail)
      .filter(([, val]) => {
        const users = Array.isArray(val) ? val : Object.values(val);
        return users.some(u => u.name === userName);
      })
      .map(([key]) => { const [y, mo, d] = key.split("-").map(Number); return { y, mo, d }; })
      .sort((a, b) => a.y !== b.y ? a.y - b.y : a.mo !== b.mo ? a.mo - b.mo : a.d - b.d);

    const grouped = myDays.reduce((acc, { y, mo, d }) => {
      const k = `${MONTHS[mo]} ${y}`;
      if (!acc[k]) acc[k] = [];
      acc[k].push(d);
      return acc;
    }, {});

    return (
      <div style={{ maxWidth: 420, margin: "2rem auto", padding: "0 1rem" }}>
        <div style={{ padding: 20, borderRadius: 12, background: "#d4edda", border: "1.5px solid #3DBF82", marginBottom: 24, textAlign: "center" }}>
          <div style={{ width: 48, height: 48, borderRadius: "50%", background: "#3DBF82", display: "flex", alignItems: "center", justifyContent: "center", margin: "0 auto 12px", fontSize: 22, color: "#fff" }}>✓</div>
          <p style={{ fontSize: 18, fontWeight: 500, color: "#1a5e2a", marginBottom: 4 }}>Availability submitted!</p>
          <p style={{ fontSize: 14, color: "#2d7a3a" }}>Thanks, {userName}. Your selections have been saved.</p>
        </div>

        <div style={{ padding: "12px 16px", borderRadius: 8, background: "#EBF2FF", border: "1.5px solid #4F8EF7", marginBottom: 20 }}>
          <p style={{ fontSize: 12, color: "#185FA5", marginBottom: 2, fontWeight: 500, textTransform: "uppercase", letterSpacing: "0.05em" }}>Event</p>
          <p style={{ fontSize: 16, fontWeight: 500, color: "#0C447C" }}>{sessionData.title}</p>
        </div>

        <div style={{ padding: "14px 16px", borderRadius: 8, border: "0.5px solid #ddd", background: "#fff", marginBottom: 16 }}>
          <p style={{ fontSize: 11, color: "#888", marginBottom: 12, textTransform: "uppercase", letterSpacing: "0.04em", fontWeight: 500 }}>Your available dates</p>
          {Object.keys(grouped).length === 0
            ? <p style={{ fontSize: 14, color: "#888" }}>No dates selected.</p>
            : Object.entries(grouped).map(([label, days]) => (
              <div key={label} style={{ marginBottom: 10 }}>
                <p style={{ fontSize: 13, fontWeight: 500, marginBottom: 6 }}>{label}</p>
                <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                  {days.map(d => (
                    <div key={d} style={{ width: 32, height: 32, borderRadius: 6, background: userColor, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 13, fontWeight: 500, color: "#fff" }}>{d}</div>
                  ))}
                </div>
              </div>
            ))
          }
        </div>

        <div style={{ marginBottom: 20 }}>
          <ParticipantList
            users={sessionData.users || []}
            userName={userName}
            sessionId={sessionId}
            sessionData={sessionData}
            saveSession={saveSession}
          />
        </div>

        <button onClick={() => { setSubmitted(false); setViewOnly(true); }}
          style={{ width: "100%", marginBottom: 10, padding: "14px 0", fontSize: 15, fontWeight: 500, borderRadius: 8, background: "#4F8EF7", color: "#fff", border: "none" }}>
          View group availability
        </button>
        <button onClick={() => { setSubmitted(false); setViewOnly(false); }}
          style={{ width: "100%", padding: "14px 0", fontSize: 15, fontWeight: 500, borderRadius: 8, background: "#fff", color: "#1a1a18", border: "1.5px solid #ccc" }}>
          Edit my availability
        </button>
      </div>
    );
  }

  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
